<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLP Attendance Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #4f8ef7, #7b6ef6);
    color: white; padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header span.icon { font-size: 1.6rem; }
  .sync-badge {
    font-size: 0.75rem; padding: 4px 10px; border-radius: 20px;
    font-weight: 700; background: rgba(255,255,255,0.2);
  }
  .sync-badge.live    { background: rgba(72,187,120,0.4); }
  .sync-badge.offline { background: rgba(252,129,129,0.4); }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 16px 28px; background: white; border-bottom: 1px solid #e2e8f0;
  }
  .toolbar label { font-size: 0.85rem; font-weight: 600; color: #718096; }
  .toolbar input[type="date"] {
    padding: 7px 12px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 0.9rem; color: #2d3748;
  }

  .tab-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 14px 28px 0; }
  .tab {
    padding: 7px 16px; border-radius: 8px 8px 0 0; border: 1px solid #cbd5e0;
    border-bottom: none; background: #e2e8f0; cursor: pointer; font-size: 0.85rem;
    font-weight: 600; color: #718096; transition: background 0.15s;
  }
  .tab.active { background: white; color: #4f8ef7; }
  .tab:hover:not(.active) { background: #edf2f7; }
  .add-grade-btn {
    padding: 7px 14px; border-radius: 8px 8px 0 0; border: 1px dashed #a0aec0;
    border-bottom: none; background: transparent; cursor: pointer; font-size: 0.85rem; color: #a0aec0;
  }
  .add-grade-btn:hover { color: #4f8ef7; border-color: #4f8ef7; }

  .panel {
    background: white; margin: 0 28px 20px; border: 1px solid #cbd5e0;
    border-radius: 0 8px 8px 8px; padding: 20px;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .panel-header h2 { font-size: 1rem; font-weight: 700; color: #2d3748; }

  .btn {
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #4f8ef7; color: white; }
  .btn-danger  { background: #fc8181; color: white; }
  .btn-sm { padding: 4px 10px; font-size: 0.78rem; }

  .student-table { width: 100%; border-collapse: collapse; }
  .student-table th {
    text-align: left; padding: 8px 12px; background: #f7fafc;
    border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; color: #718096;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .student-table td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; vertical-align: middle; }
  .student-table tr:last-child td { border-bottom: none; }
  .student-table tr:hover td { background: #f7fafc; }

  .status-btn {
    padding: 5px 12px; border-radius: 20px; border: 2px solid transparent;
    cursor: pointer; font-size: 0.78rem; font-weight: 700; transition: all 0.15s; margin: 0 2px;
  }
  .status-btn.present  { background: #c6f6d5; color: #276749; border-color: #48bb78; }
  .status-btn.absent   { background: #fed7d7; color: #9b2c2c; border-color: #fc8181; }
  .status-btn.canceled { background: #fef3c7; color: #92400e; border-color: #f6ad55; }
  .status-btn.inactive { background: #f7fafc; color: #a0aec0; border-color: #e2e8f0; }
  .status-btn:hover { opacity: 0.8; }

  .progress-wrap { min-width: 150px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; font-weight: 700; margin-bottom: 3px;
  }
  .progress-label .count { color: #2d3748; }
  .progress-label .pct   { color: #a0aec0; }
  .progress-bar-bg { height: 7px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  .fill-done    { background: #4f8ef7; }
  .fill-ok      { background: #48bb78; }
  .fill-warning { background: #f6ad55; }
  .fill-danger  { background: #fc8181; }

  .summary-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .summary-chip {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 20px; font-size: 0.82rem; font-weight: 700;
  }
  .chip-present  { background: #c6f6d5; color: #276749; }
  .chip-absent   { background: #fed7d7; color: #9b2c2c; }
  .chip-canceled { background: #fef3c7; color: #92400e; }
  .chip-total    { background: #ebf4ff; color: #2b6cb0; }

  .add-student-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
  .add-student-row input[type="text"] {
    flex: 2; min-width: 140px; padding: 8px 12px; border: 1px solid #cbd5e0;
    border-radius: 8px; font-size: 0.9rem;
  }
  .add-student-row input[type="number"] {
    width: 70px; padding: 8px 10px; border: 1px solid #cbd5e0;
    border-radius: 8px; font-size: 0.9rem;
  }
  .add-student-row label { font-size: 0.82rem; color: #718096; white-space: nowrap; }

  .empty-state { text-align: center; color: #a0aec0; padding: 30px 0; font-size: 0.9rem; }

  .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .history-table th {
    text-align: left; padding: 7px 10px; background: #f7fafc; border-bottom: 2px solid #e2e8f0;
    color: #718096; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.04em;
  }
  .history-table td { padding: 7px 10px; border-bottom: 1px solid #edf2f7; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; padding: 24px; width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h3 { margin-bottom: 14px; font-size: 1rem; }
  .modal label { font-size: 0.82rem; color: #718096; display: block; margin-bottom: 4px; }
  .modal input {
    width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 0.9rem; margin-bottom: 12px;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  nav.view-tabs { display: flex; gap: 8px; padding: 16px 28px 0; flex-wrap: wrap; }
  .view-tab {
    padding: 7px 18px; border-radius: 8px; border: 1px solid #cbd5e0;
    background: #e2e8f0; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #718096;
  }
  .view-tab.active { background: #4f8ef7; color: white; border-color: #4f8ef7; }

  #history-view, #progress-view { display: none; }
  #main-view { display: block; }

  .loading { text-align: center; padding: 40px; color: #a0aec0; font-size: 0.95rem; }
  .spinner {
    display: inline-block; width: 28px; height: 28px; border: 3px solid #e2e8f0;
    border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px;
    margin-bottom: 8px; background: white; flex-wrap: wrap; gap: 10px;
  }
  .progress-card.behind  { background: #fff5f5; border-color: #fed7d7; }
  .progress-card.met     { background: #f0fff4; border-color: #c6f6d5; }
  .progress-card .sname  { font-weight: 700; font-size: 0.92rem; }
  .progress-card .sgrade { font-size: 0.75rem; color: #a0aec0; margin-left: 6px; }
  .behind-badge  { padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; background: #fed7d7; color: #9b2c2c; white-space: nowrap; }
  .met-badge     { padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; background: #c6f6d5; color: #276749; white-space: nowrap; }

  .month-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .month-selector label { font-size: 0.85rem; font-weight: 600; color: #718096; }
  .month-selector input[type="month"] {
    padding: 6px 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 0.9rem;
  }
  .section-heading {
    font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 2px solid #e2e8f0;
  }
  .section-heading.red   { color: #9b2c2c; border-color: #fed7d7; }
  .section-heading.green { color: #276749; border-color: #c6f6d5; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="icon">🗣️</span>
    <h1>SLP Attendance Tracker</h1>
  </div>
  <div class="sync-badge" id="sync-badge">⏳ Connecting…</div>
</header>

<div class="toolbar">
  <label>Session Date:</label>
  <input type="date" id="session-date">
</div>

<nav class="view-tabs">
  <button class="view-tab active" onclick="switchView('main')">📋 Take Attendance</button>
  <button class="view-tab" onclick="switchView('progress')">📊 Session Progress</button>
  <button class="view-tab" onclick="switchView('history')">📅 History</button>
</nav>

<div id="main-view">
  <div class="tab-bar" id="grade-tabs"></div>
  <div class="panel" id="student-panel">
    <div class="panel-header">
      <h2 id="panel-title">Loading…</h2>
      <button class="btn btn-danger btn-sm" onclick="deleteGrade()">🗑 Remove Grade</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div id="student-list-container">
      <div class="loading"><div class="spinner"></div><br>Connecting to database…</div>
    </div>
    <div class="add-student-row">
      <input type="text" id="new-student-input" placeholder="Student name…" onkeydown="if(event.key==='Enter')addStudent()">
      <label>Goal/month:</label>
      <input type="number" id="new-student-goal" value="12" min="1" max="31">
      <button class="btn btn-primary" onclick="addStudent()">+ Add</button>
    </div>
  </div>
</div>

<div id="progress-view">
  <div class="panel" style="margin-top:0;">
    <div class="panel-header">
      <h2>📊 Session Progress</h2>
      <button class="btn btn-primary" onclick="exportProgressCSV()">⬇ Export CSV</button>
    </div>
    <div class="month-selector">
      <label>Month:</label>
      <input type="month" id="progress-month">
    </div>
    <div id="progress-content"></div>
  </div>
</div>

<div id="history-view">
  <div class="panel" style="margin-top:0;">
    <div class="panel-header">
      <h2>Attendance History</h2>
      <button class="btn btn-primary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="history-content"></div>
  </div>
</div>

<!-- Add Grade Modal -->
<div class="modal-overlay" id="grade-modal">
  <div class="modal">
    <h3>Add Grade / Classroom</h3>
    <label>Name</label>
    <input type="text" id="grade-input" placeholder="e.g. Kindergarten, 3rd Grade, Mrs. Smith…" onkeydown="if(event.key==='Enter')confirmAddGrade()">
    <div class="modal-btns">
      <button class="btn" style="background:#e2e8f0;color:#4a5568;" onclick="closeGradeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddGrade()">Add</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, remove, onValue, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ZqYg8mr1EMLOuFF1zoxCDAc3j2sjxrU",
  authDomain: "slp-t-4a28a.firebaseapp.com",
  databaseURL: "https://slp-t-4a28a-default-rtdb.firebaseio.com",
  projectId: "slp-t-4a28a",
  storageBucket: "slp-t-4a28a.firebasestorage.app",
  messagingSenderId: "484656541330",
  appId: "1:484656541330:web:905058fa2dc5a78152c04b"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let grades  = {};
let records = {};
let activeGradeId = null;

const syncBadge = document.getElementById('sync-badge');

onValue(ref(db, 'grades'), snap => {
  grades = snap.val() || {};
  if (!activeGradeId || !grades[activeGradeId])
    activeGradeId = Object.keys(grades)[0] || null;
  syncBadge.textContent = '🟢 Live';
  syncBadge.className = 'sync-badge live';
  renderGradeTabs();
  renderStudentPanel();
}, () => {
  syncBadge.textContent = '🔴 Offline';
  syncBadge.className = 'sync-badge offline';
});

onValue(ref(db, 'records'), snap => {
  records = snap.val() || {};
  renderStudentPanel();
  if (document.getElementById('progress-view').style.display !== 'none') renderProgress();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function getDate()    { return document.getElementById('session-date').value; }
function getMonth()   { return document.getElementById('progress-month').value; }

function formatDate(d) {
  const [y,m,day] = d.split('-');
  return new Date(y, m-1, day).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function countSessions(studentId, gradeId, yyyymm) {
  return Object.values(records).filter(r =>
    r.studentId === studentId &&
    r.gradeId   === gradeId &&
    r.status    === 'present' &&
    r.date.startsWith(yyyymm)
  ).length;
}

function makeProgressBar(count, goal) {
  const pct = Math.min(100, Math.round((count / goal) * 100));
  let cls = 'fill-danger';
  if (count >= goal)      cls = 'fill-done';
  else if (pct >= 60)     cls = 'fill-ok';
  else if (pct >= 30)     cls = 'fill-warning';
  return `<div class="progress-wrap">
    <div class="progress-label">
      <span class="count">${count} / ${goal} sessions</span>
      <span class="pct">${count >= goal ? '✓ Met' : pct + '%'}</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill ${cls}" style="width:${pct}%"></div>
    </div>
  </div>`;
}

// ── Grade Tabs ────────────────────────────────────────────────────────────────
window.renderGradeTabs = function() {
  const bar = document.getElementById('grade-tabs');
  bar.innerHTML = '';
  Object.entries(grades).forEach(([id, g]) => {
    const t = document.createElement('button');
    t.className = 'tab' + (id === activeGradeId ? ' active' : '');
    t.textContent = g.name;
    t.onclick = () => { activeGradeId = id; renderGradeTabs(); renderStudentPanel(); };
    bar.appendChild(t);
  });
  const add = document.createElement('button');
  add.className = 'add-grade-btn';
  add.textContent = '+ Add Grade';
  add.onclick = openGradeModal;
  bar.appendChild(add);
};

window.openGradeModal    = () => { document.getElementById('grade-modal').classList.add('open'); document.getElementById('grade-input').value=''; setTimeout(()=>document.getElementById('grade-input').focus(),50); };
window.closeGradeModal   = () => document.getElementById('grade-modal').classList.remove('open');
window.confirmAddGrade   = async function() {
  const name = document.getElementById('grade-input').value.trim();
  if (!name) return;
  const r = push(ref(db, 'grades'));
  await set(r, { name, students: {} });
  activeGradeId = r.key;
  closeGradeModal();
};
window.deleteGrade = async function() {
  if (!activeGradeId) return;
  if (!confirm(`Remove "${grades[activeGradeId].name}" and all its students?`)) return;
  await remove(ref(db, `grades/${activeGradeId}`));
  const del = {};
  Object.entries(records).forEach(([id,r]) => { if(r.gradeId===activeGradeId) del[`records/${id}`]=null; });
  if (Object.keys(del).length) await update(ref(db), del);
  activeGradeId = null;
};

// ── Student Panel ─────────────────────────────────────────────────────────────
window.renderStudentPanel = function() {
  const grade  = grades[activeGradeId];
  const date   = getDate();
  const yyyymm = date.slice(0,7);

  if (!grade) {
    document.getElementById('panel-title').textContent = 'No grade selected';
    document.getElementById('student-list-container').innerHTML = '<div class="empty-state">Add a grade to get started.</div>';
    document.getElementById('summary-bar').innerHTML = '';
    return;
  }

  document.getElementById('panel-title').textContent = grade.name;
  const students = grade.students || {};

  const todayStatus = {};
  Object.values(records).forEach(r => {
    if (r.gradeId === activeGradeId && r.date === date) todayStatus[r.studentId] = r.status;
  });

  let P=0, A=0, C=0;
  Object.keys(students).forEach(sid => {
    const st = todayStatus[sid]||'none';
    if(st==='present') P++; else if(st==='absent') A++; else if(st==='canceled') C++;
  });
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-chip chip-total">👥 ${Object.keys(students).length}</div>
    <div class="summary-chip chip-present">✅ ${P} present</div>
    <div class="summary-chip chip-absent">❌ ${A} absent</div>
    <div class="summary-chip chip-canceled">🟡 ${C} canceled</div>`;

  if (!Object.keys(students).length) {
    document.getElementById('student-list-container').innerHTML = '<div class="empty-state">No students yet. Add one below!</div>';
    return;
  }

  let html = `<table class="student-table">
    <thead><tr><th>Student</th><th>This Month</th><th>Today's Status</th><th></th></tr></thead><tbody>`;

  Object.entries(students).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([sid,s]) => {
    const status = todayStatus[sid]||'none';
    const goal   = s.goal || 12;
    const count  = countSessions(sid, activeGradeId, yyyymm);
    html += `<tr>
      <td>
        <div style="font-weight:600;">${s.name}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:5px;">
          <span style="font-size:0.73rem;color:#a0aec0;">Goal:</span>
          <input type="number" id="goal_${sid}" value="${goal}" min="1" max="31"
            style="width:50px;padding:2px 5px;border:1px solid #cbd5e0;border-radius:6px;font-size:0.8rem;text-align:center;">
          <button onclick="saveGoal('${sid}')"
            style="padding:2px 8px;border-radius:6px;border:none;cursor:pointer;font-size:0.73rem;font-weight:700;background:#e2e8f0;color:#4a5568;">Save</button>
        </div>
      </td>
      <td>${makeProgressBar(count, goal)}</td>
      <td>
        <button class="status-btn ${status==='present'?'present':'inactive'}" onclick="setStatus('${sid}','present')">✅ Present</button>
        <button class="status-btn ${status==='absent'?'absent':'inactive'}" onclick="setStatus('${sid}','absent')">❌ Absent</button>
        <button class="status-btn ${status==='canceled'?'canceled':'inactive'}" onclick="setStatus('${sid}','canceled')">🟡 Canceled</button>
      </td>
      <td><button class="btn btn-sm" style="background:#edf2f7;color:#718096;" onclick="removeStudent('${sid}')">✕</button></td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('student-list-container').innerHTML = html;
};

window.saveGoal = async function(sid) {
  const val = parseInt(document.getElementById(`goal_${sid}`).value);
  if (!val || val < 1 || !activeGradeId) return;
  await update(ref(db, `grades/${activeGradeId}/students/${sid}`), { goal: val });
};

window.setStatus = async function(studentId, status) {
  const date = getDate();
  const existing = Object.entries(records).find(([,r]) =>
    r.gradeId===activeGradeId && r.date===date && r.studentId===studentId);
  if (existing) {
    await update(ref(db, `records/${existing[0]}`), { status });
  } else {
    await push(ref(db, 'records'), { date, gradeId: activeGradeId, studentId, status });
  }
};

window.addStudent = async function() {
  const name = document.getElementById('new-student-input').value.trim();
  const goal = parseInt(document.getElementById('new-student-goal').value) || 12;
  if (!name || !activeGradeId) return;
  await push(ref(db, `grades/${activeGradeId}/students`), { name, goal });
  document.getElementById('new-student-input').value = '';
  document.getElementById('new-student-goal').value  = 12;
};

window.removeStudent = async function(sid) {
  if (!confirm('Remove this student?')) return;
  await remove(ref(db, `grades/${activeGradeId}/students/${sid}`));
  const del = {};
  Object.entries(records).forEach(([id,r]) => { if(r.studentId===sid) del[`records/${id}`]=null; });
  if (Object.keys(del).length) await update(ref(db), del);
};

// ── Session Progress View ─────────────────────────────────────────────────────
window.renderProgress = function() {
  const container = document.getElementById('progress-content');
  const yyyymm = getMonth();
  const [y,m] = yyyymm.split('-');
  const monthLabel = new Date(y, m-1, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });

  const all = [];
  Object.entries(grades).forEach(([gradeId, grade]) => {
    Object.entries(grade.students||{}).forEach(([sid, s]) => {
      const goal  = s.goal || 12;
      const count = countSessions(sid, gradeId, yyyymm);
      all.push({ sid, gradeId, name: s.name, gradeName: grade.name, goal, count });
    });
  });

  if (!all.length) {
    container.innerHTML = '<div class="empty-state">No students added yet.</div>';
    return;
  }

  const behind  = all.filter(s => s.count < s.goal).sort((a,b) => (a.count/a.goal)-(b.count/b.goal));
  const met     = all.filter(s => s.count >= s.goal).sort((a,b) => b.count-a.count);

  let html = `<p style="font-size:0.83rem;color:#718096;margin-bottom:14px;">
    Only <strong>Present</strong> sessions count toward the monthly goal. Showing <strong>${monthLabel}</strong>.
  </p>`;

  if (behind.length) {
    html += `<div class="section-heading red">⚠️ Behind Goal — ${behind.length} student${behind.length>1?'s':''}</div>`;
    behind.forEach(s => {
      const needed = s.goal - s.count;
      html += `<div class="progress-card behind">
        <div style="flex:1;min-width:200px;">
          <span class="sname">${s.name}</span><span class="sgrade">${s.gradeName}</span>
          <div style="margin-top:7px;">${makeProgressBar(s.count, s.goal)}</div>
        </div>
        <span class="behind-badge">Needs ${needed} more</span>
      </div>`;
    });
  }

  if (met.length) {
    html += `<div class="section-heading green" style="margin-top:${behind.length?'20px':'0'};">✅ Goal Met — ${met.length} student${met.length>1?'s':''}</div>`;
    met.forEach(s => {
      html += `<div class="progress-card met">
        <div style="flex:1;min-width:200px;">
          <span class="sname">${s.name}</span><span class="sgrade">${s.gradeName}</span>
          <div style="margin-top:7px;">${makeProgressBar(s.count, s.goal)}</div>
        </div>
        <span class="met-badge">✓ Met</span>
      </div>`;
    });
  }

  container.innerHTML = html;
};

window.exportProgressCSV = function() {
  const yyyymm = getMonth();
  let csv = 'Grade,Student,Monthly Goal,Sessions Completed,Sessions Needed\n';
  Object.entries(grades).forEach(([gradeId, grade]) => {
    Object.entries(grade.students||{}).forEach(([sid, s]) => {
      const goal   = s.goal || 12;
      const count  = countSessions(sid, gradeId, yyyymm);
      const needed = Math.max(0, goal - count);
      csv += `"${grade.name}","${s.name}","${goal}","${count}","${needed}"\n`;
    });
  });
  dl(csv, `slp_progress_${yyyymm}.csv`);
};

// ── History ───────────────────────────────────────────────────────────────────
window.renderHistory = function() {
  const container = document.getElementById('history-content');
  const recs = Object.values(records);
  if (!recs.length) { container.innerHTML = '<div class="empty-state">No records yet.</div>'; return; }
  const byDate = {};
  recs.forEach(r => { if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });
  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    html += `<h3 style="margin:16px 0 8px;font-size:0.9rem;color:#4f8ef7;">${formatDate(date)}</h3>`;
    html += `<table class="history-table"><thead><tr><th>Grade</th><th>Student</th><th>Status</th></tr></thead><tbody>`;
    byDate[date].forEach(r => {
      const grade   = grades[r.gradeId];
      const student = grade?.students?.[r.studentId];
      if (!grade||!student) return;
      const b = r.status==='present'?'✅':r.status==='absent'?'❌':'🟡';
      html += `<tr><td>${grade.name}</td><td>${student.name}</td><td>${b} ${capitalize(r.status)}</td></tr>`;
    });
    html += '</tbody></table>';
  });
  container.innerHTML = html;
};

window.exportCSV = function() {
  let csv = 'Date,Grade,Student,Status\n';
  Object.values(records).forEach(r => {
    const grade   = grades[r.gradeId];
    const student = grade?.students?.[r.studentId];
    if (!grade||!student) return;
    csv += `"${r.date}","${grade.name}","${student.name}","${r.status}"\n`;
  });
  dl(csv, 'slp_attendance.csv');
};

// ── View Switching ────────────────────────────────────────────────────────────
window.switchView = function(view) {
  document.getElementById('main-view').style.display     = view==='main'     ? 'block':'none';
  document.getElementById('progress-view').style.display = view==='progress' ? 'block':'none';
  document.getElementById('history-view').style.display  = view==='history'  ? 'block':'none';
  document.querySelectorAll('.view-tab').forEach((t,i) => {
    t.classList.toggle('active',
      (i===0&&view==='main')||(i===1&&view==='progress')||(i===2&&view==='history'));
  });
  if (view==='history')  renderHistory();
  if (view==='progress') renderProgress();
};

function dl(csv, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = filename; a.click();
}

// Init
const today = new Date().toISOString().split('T')[0];
document.getElementById('session-date').value   = today;
document.getElementById('progress-month').value = today.slice(0,7);
document.getElementById('session-date').addEventListener('change', renderStudentPanel);
document.getElementById('progress-month').addEventListener('change', renderProgress);
</script>
