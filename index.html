<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLP Attendance Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #4f8ef7, #7b6ef6);
    color: white;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header span { font-size: 1.6rem; }
  .sync-badge {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
  }
  .sync-badge.live { background: rgba(72,187,120,0.4); }
  .sync-badge.offline { background: rgba(252,129,129,0.4); }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 16px 28px; background: white; border-bottom: 1px solid #e2e8f0;
  }
  .toolbar label { font-size: 0.85rem; font-weight: 600; color: #718096; }
  .toolbar input[type="date"] {
    padding: 7px 12px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 0.9rem; color: #2d3748;
  }

  .tab-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 14px 28px 0; }
  .tab {
    padding: 7px 16px; border-radius: 8px 8px 0 0; border: 1px solid #cbd5e0;
    border-bottom: none; background: #e2e8f0; cursor: pointer; font-size: 0.85rem;
    font-weight: 600; color: #718096; transition: background 0.15s;
  }
  .tab.active { background: white; color: #4f8ef7; }
  .tab:hover:not(.active) { background: #edf2f7; }
  .add-grade-btn {
    padding: 7px 14px; border-radius: 8px 8px 0 0; border: 1px dashed #a0aec0;
    border-bottom: none; background: transparent; cursor: pointer; font-size: 0.85rem; color: #a0aec0;
  }
  .add-grade-btn:hover { color: #4f8ef7; border-color: #4f8ef7; }

  .panel {
    background: white; margin: 0 28px 20px; border: 1px solid #cbd5e0;
    border-radius: 0 8px 8px 8px; padding: 20px;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .panel-header h2 { font-size: 1rem; font-weight: 700; color: #2d3748; }

  .btn {
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #4f8ef7; color: white; }
  .btn-success { background: #48bb78; color: white; }
  .btn-danger { background: #fc8181; color: white; }
  .btn-sm { padding: 4px 10px; font-size: 0.78rem; }

  .student-table { width: 100%; border-collapse: collapse; }
  .student-table th {
    text-align: left; padding: 8px 12px; background: #f7fafc;
    border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; color: #718096;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .student-table td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; }
  .student-table tr:last-child td { border-bottom: none; }
  .student-table tr:hover td { background: #f7fafc; }

  .status-btn {
    padding: 5px 12px; border-radius: 20px; border: 2px solid transparent;
    cursor: pointer; font-size: 0.78rem; font-weight: 700; transition: all 0.15s; margin: 0 2px;
  }
  .status-btn.present  { background: #c6f6d5; color: #276749; border-color: #48bb78; }
  .status-btn.absent   { background: #fed7d7; color: #9b2c2c; border-color: #fc8181; }
  .status-btn.canceled { background: #fef3c7; color: #92400e; border-color: #f6ad55; }
  .status-btn.inactive { background: #f7fafc; color: #a0aec0; border-color: #e2e8f0; }
  .status-btn:hover { opacity: 0.8; }

  .summary-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .summary-chip {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 20px; font-size: 0.82rem; font-weight: 700;
  }
  .chip-present  { background: #c6f6d5; color: #276749; }
  .chip-absent   { background: #fed7d7; color: #9b2c2c; }
  .chip-canceled { background: #fef3c7; color: #92400e; }
  .chip-total    { background: #ebf4ff; color: #2b6cb0; }

  .add-student-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-student-row input {
    flex: 1; padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 0.9rem;
  }

  .empty-state { text-align: center; color: #a0aec0; padding: 30px 0; font-size: 0.9rem; }

  .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .history-table th {
    text-align: left; padding: 7px 10px; background: #f7fafc; border-bottom: 2px solid #e2e8f0;
    color: #718096; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.04em;
  }
  .history-table td { padding: 7px 10px; border-bottom: 1px solid #edf2f7; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; padding: 24px; width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h3 { margin-bottom: 14px; font-size: 1rem; }
  .modal input {
    width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 0.9rem; margin-bottom: 14px;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  nav.view-tabs { display: flex; gap: 8px; padding: 16px 28px 0; }
  .view-tab {
    padding: 7px 18px; border-radius: 8px; border: 1px solid #cbd5e0;
    background: #e2e8f0; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #718096;
  }
  .view-tab.active { background: #4f8ef7; color: white; border-color: #4f8ef7; }

  #history-view, #makeup-view { display: none; }
  #main-view { display: block; }

  .loading { text-align: center; padding: 40px; color: #a0aec0; font-size: 0.95rem; }
  .spinner {
    display: inline-block; width: 28px; height: 28px; border: 3px solid #e2e8f0;
    border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .makeup-section { margin-bottom: 20px; }
  .makeup-section h3 { font-size: 0.85rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .makeup-card {
    display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; background: #fffbeb; flex-wrap: wrap; gap: 8px;
  }
  .makeup-card .student-name { font-weight: 600; font-size: 0.9rem; }
  .makeup-card .makeup-meta { font-size: 0.78rem; color: #a0aec0; }
  .makeup-done-btn {
    padding: 4px 12px; border-radius: 20px; border: 2px solid #48bb78;
    background: white; color: #276749; font-size: 0.78rem; font-weight: 700; cursor: pointer;
  }
  .makeup-done-btn:hover { background: #c6f6d5; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span>🗣️</span>
    <h1>SLP Attendance Tracker</h1>
  </div>
  <div class="sync-badge" id="sync-badge">⏳ Connecting…</div>
</header>

<div class="toolbar">
  <label>Session Date:</label>
  <input type="date" id="session-date">
</div>

<nav class="view-tabs">
  <button class="view-tab active" onclick="switchView('main')">📋 Take Attendance</button>
  <button class="view-tab" onclick="switchView('makeup')">🔁 Make-Ups</button>
  <button class="view-tab" onclick="switchView('history')">📅 History</button>
</nav>

<div id="main-view">
  <div class="tab-bar" id="grade-tabs"></div>
  <div class="panel" id="student-panel">
    <div class="panel-header">
      <h2 id="panel-title">Loading…</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-danger btn-sm" onclick="deleteGrade()">🗑 Remove Grade</button>
      </div>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div id="student-list-container"><div class="loading"><div class="spinner"></div><br>Connecting to database…</div></div>
    <div class="add-student-row">
      <input type="text" id="new-student-input" placeholder="Add student name…" onkeydown="if(event.key==='Enter')addStudent()">
      <button class="btn btn-primary" onclick="addStudent()">+ Add</button>
    </div>
  </div>
</div>

<div id="makeup-view">
  <div class="panel" style="margin-top:0;">
    <div class="panel-header">
      <h2>🔁 Make-Up Sessions Needed</h2>
      <button class="btn btn-primary" onclick="exportMakeupCSV()">⬇ Export CSV</button>
    </div>
    <p style="font-size:0.82rem;color:#718096;margin-bottom:16px;">Students marked <strong>Absent</strong> or <strong>Canceled</strong> who still need a make-up session.</p>
    <div id="makeup-content"></div>
  </div>
</div>

<div id="history-view">
  <div class="panel" style="margin-top:0;">
    <div class="panel-header">
      <h2>Attendance History</h2>
      <button class="btn btn-primary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="history-content"></div>
  </div>
</div>

<!-- Add Grade Modal -->
<div class="modal-overlay" id="grade-modal">
  <div class="modal">
    <h3>Add Grade / Classroom</h3>
    <input type="text" id="grade-input" placeholder="e.g. Kindergarten, 3rd Grade, Mrs. Smith…" onkeydown="if(event.key==='Enter')confirmAddGrade()">
    <div class="modal-btns">
      <button class="btn" style="background:#e2e8f0;color:#4a5568;" onclick="closeGradeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddGrade()">Add</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ZqYg8mr1EMLOuFF1zoxCDAc3j2sjxrU",
  authDomain: "slp-t-4a28a.firebaseapp.com",
  databaseURL: "https://slp-t-4a28a-default-rtdb.firebaseio.com",
  projectId: "slp-t-4a28a",
  storageBucket: "slp-t-4a28a.firebasestorage.app",
  messagingSenderId: "484656541330",
  appId: "1:484656541330:web:905058fa2dc5a78152c04b"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Live state from Firebase ──────────────────────────────────────────────────
let grades  = {};   // { gradeId: { name, students: { studentId: { name } } } }
let records = {};   // { recordId: { date, gradeId, studentId, status } }
let makeups = {};   // { makeupKey: true }
let activeGradeId = null;

const badge = document.getElementById('sync-badge');

// Listen to grades
onValue(ref(db, 'grades'), snap => {
  grades = snap.val() || {};
  if (!activeGradeId || !grades[activeGradeId]) {
    activeGradeId = Object.keys(grades)[0] || null;
  }
  badge.textContent = '🟢 Live';
  badge.className = 'sync-badge live';
  renderGradeTabs();
  renderStudentPanel();
}, err => {
  badge.textContent = '🔴 Offline';
  badge.className = 'sync-badge offline';
});

// Listen to records
onValue(ref(db, 'records'), snap => {
  records = snap.val() || {};
  renderStudentPanel();
});

// Listen to makeups
onValue(ref(db, 'makeups'), snap => {
  makeups = snap.val() || {};
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function getDate() { return document.getElementById('session-date').value; }

function formatDate(d) {
  const [y,m,day] = d.split('-');
  return new Date(y,m-1,day).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

// ── Grade Management ──────────────────────────────────────────────────────────
window.renderGradeTabs = function() {
  const bar = document.getElementById('grade-tabs');
  bar.innerHTML = '';
  Object.entries(grades).forEach(([id, g]) => {
    const t = document.createElement('button');
    t.className = 'tab' + (id === activeGradeId ? ' active' : '');
    t.textContent = g.name;
    t.onclick = () => { activeGradeId = id; renderGradeTabs(); renderStudentPanel(); };
    bar.appendChild(t);
  });
  const add = document.createElement('button');
  add.className = 'add-grade-btn';
  add.textContent = '+ Add Grade';
  add.onclick = openGradeModal;
  bar.appendChild(add);
};

window.openGradeModal = function() {
  document.getElementById('grade-modal').classList.add('open');
  document.getElementById('grade-input').value = '';
  setTimeout(() => document.getElementById('grade-input').focus(), 50);
};
window.closeGradeModal = function() {
  document.getElementById('grade-modal').classList.remove('open');
};
window.confirmAddGrade = async function() {
  const name = document.getElementById('grade-input').value.trim();
  if (!name) return;
  const newRef = push(ref(db, 'grades'));
  await set(newRef, { name, students: {} });
  activeGradeId = newRef.key;
  closeGradeModal();
};
window.deleteGrade = async function() {
  if (!activeGradeId) return;
  const g = grades[activeGradeId];
  if (!confirm(`Remove "${g.name}" and all its students?`)) return;
  await remove(ref(db, `grades/${activeGradeId}`));
  // Remove related records
  const toDelete = {};
  Object.entries(records).forEach(([id, r]) => {
    if (r.gradeId === activeGradeId) toDelete[`records/${id}`] = null;
  });
  if (Object.keys(toDelete).length) await update(ref(db), toDelete);
  activeGradeId = null;
};

// ── Student Panel ─────────────────────────────────────────────────────────────
window.renderStudentPanel = function() {
  const grade = grades[activeGradeId];
  const date  = getDate();

  if (!grade) {
    document.getElementById('panel-title').textContent = 'No grade selected';
    document.getElementById('student-list-container').innerHTML =
      '<div class="empty-state">Add a grade to get started.</div>';
    document.getElementById('summary-bar').innerHTML = '';
    return;
  }

  document.getElementById('panel-title').textContent = grade.name;

  const students = grade.students || {};

  // Build today's status map
  const todayStatus = {};
  Object.values(records).forEach(r => {
    if (r.gradeId === activeGradeId && r.date === date) {
      todayStatus[r.studentId] = r.status;
    }
  });

  // Summary
  let P=0, A=0, C=0;
  Object.keys(students).forEach(sid => {
    const st = todayStatus[sid] || 'none';
    if(st==='present') P++;
    else if(st==='absent') A++;
    else if(st==='canceled') C++;
  });
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-chip chip-total">👥 ${Object.keys(students).length} students</div>
    <div class="summary-chip chip-present">✅ ${P} present</div>
    <div class="summary-chip chip-absent">❌ ${A} absent</div>
    <div class="summary-chip chip-canceled">🟡 ${C} canceled</div>
  `;

  if (!Object.keys(students).length) {
    document.getElementById('student-list-container').innerHTML =
      '<div class="empty-state">No students yet. Add one below!</div>';
    return;
  }

  let html = `<table class="student-table">
    <thead><tr><th>Student</th><th>Status</th><th></th></tr></thead><tbody>`;
  Object.entries(students).sort((a,b) => a[1].name.localeCompare(b[1].name)).forEach(([sid, s]) => {
    const status = todayStatus[sid] || 'none';
    html += `<tr>
      <td>${s.name}</td>
      <td>
        <button class="status-btn ${status==='present'?'present':'inactive'}" onclick="setStatus('${sid}','present')">✅ Present</button>
        <button class="status-btn ${status==='absent'?'absent':'inactive'}" onclick="setStatus('${sid}','absent')">❌ Absent</button>
        <button class="status-btn ${status==='canceled'?'canceled':'inactive'}" onclick="setStatus('${sid}','canceled')">🟡 Canceled</button>
      </td>
      <td><button class="btn btn-sm" style="background:#edf2f7;color:#718096;" onclick="removeStudent('${sid}')">✕</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('student-list-container').innerHTML = html;
};

window.setStatus = async function(studentId, status) {
  const date = getDate();
  // Find existing record for this student+date+grade
  const existing = Object.entries(records).find(([,r]) =>
    r.gradeId === activeGradeId && r.date === date && r.studentId === studentId
  );
  if (existing) {
    await update(ref(db, `records/${existing[0]}`), { status });
  } else {
    await push(ref(db, 'records'), { date, gradeId: activeGradeId, studentId, status });
  }
};

window.addStudent = async function() {
  const input = document.getElementById('new-student-input');
  const name  = input.value.trim();
  if (!name || !activeGradeId) return;
  await push(ref(db, `grades/${activeGradeId}/students`), { name });
  input.value = '';
};

window.removeStudent = async function(studentId) {
  if (!confirm('Remove this student?')) return;
  await remove(ref(db, `grades/${activeGradeId}/students/${studentId}`));
  // Remove their records
  const toDelete = {};
  Object.entries(records).forEach(([id, r]) => {
    if (r.studentId === studentId) toDelete[`records/${id}`] = null;
  });
  if (Object.keys(toDelete).length) await update(ref(db), toDelete);
};

// ── History View ──────────────────────────────────────────────────────────────
window.renderHistory = function() {
  const container = document.getElementById('history-content');
  const recs = Object.values(records);
  if (!recs.length) {
    container.innerHTML = '<div class="empty-state">No attendance records yet.</div>';
    return;
  }
  const byDate = {};
  recs.forEach(r => { if (!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });
  const dates = Object.keys(byDate).sort().reverse();
  let html = '';
  dates.forEach(date => {
    html += `<h3 style="margin:16px 0 8px;font-size:0.9rem;color:#4f8ef7;">${formatDate(date)}</h3>`;
    html += `<table class="history-table"><thead><tr><th>Grade</th><th>Student</th><th>Status</th></tr></thead><tbody>`;
    byDate[date].forEach(r => {
      const grade   = grades[r.gradeId];
      const student = grade?.students?.[r.studentId];
      if (!grade || !student) return;
      const badge = r.status==='present'?'✅':r.status==='absent'?'❌':'🟡';
      html += `<tr><td>${grade.name}</td><td>${student.name}</td><td>${badge} ${capitalize(r.status)}</td></tr>`;
    });
    html += '</tbody></table>';
  });
  container.innerHTML = html;
};

window.exportCSV = function() {
  let csv = 'Date,Grade,Student,Status\n';
  Object.values(records).forEach(r => {
    const grade   = grades[r.gradeId];
    const student = grade?.students?.[r.studentId];
    if (!grade || !student) return;
    csv += `"${r.date}","${grade.name}","${student.name}","${r.status}"\n`;
  });
  downloadCSV(csv, 'slp_attendance.csv');
};

// ── Make-Ups View ─────────────────────────────────────────────────────────────
window.renderMakeups = function() {
  const container = document.getElementById('makeup-content');
  const nonPresent = Object.values(records).filter(r => r.status !== 'present');

  if (!nonPresent.length) {
    container.innerHTML = '<div class="empty-state">🎉 No make-ups needed! All students are up to date.</div>';
    return;
  }

  const byGrade = {};
  nonPresent.forEach(r => {
    const hasMakeup = Object.values(records).some(mr =>
      mr.studentId===r.studentId && mr.gradeId===r.gradeId &&
      mr.status==='present' && mr.date > r.date
    );
    const makeupKey = `${r.gradeId}_${r.studentId}_${r.date}`;
    const manualDone = !!makeups[makeupKey];
    if (!byGrade[r.gradeId]) byGrade[r.gradeId] = [];
    byGrade[r.gradeId].push({ ...r, madeUp: hasMakeup || manualDone, makeupKey });
  });

  let html = '';
  Object.entries(byGrade).forEach(([gradeId, items]) => {
    const grade = grades[gradeId];
    if (!grade) return;
    const pending = items.filter(x => !x.madeUp);
    const done    = items.filter(x =>  x.madeUp);
    html += `<div class="makeup-section"><h3>${grade.name}</h3>`;
    pending.forEach(item => {
      const student = grade.students?.[item.studentId];
      if (!student) return;
      const badge = item.status==='absent'?'❌ Absent':'🟡 Canceled';
      html += `<div class="makeup-card">
        <div>
          <div class="student-name">${student.name}</div>
          <div class="makeup-meta">${badge} on ${formatDate(item.date)}</div>
        </div>
        <button class="makeup-done-btn" onclick="markMakeupDone('${item.makeupKey}')">✓ Mark Made Up</button>
      </div>`;
    });
    if (done.length) {
      html += `<details style="margin-top:8px;"><summary style="font-size:0.8rem;color:#a0aec0;cursor:pointer;">✅ ${done.length} completed make-up(s)</summary><div style="margin-top:6px;">`;
      done.forEach(item => {
        const student = grade.students?.[item.studentId];
        if (!student) return;
        html += `<div class="makeup-card" style="background:#f0fff4;opacity:0.7;">
          <div>
            <div class="student-name" style="text-decoration:line-through;color:#a0aec0;">${student.name}</div>
            <div class="makeup-meta">${formatDate(item.date)}</div>
          </div>
          <span style="font-size:0.78rem;color:#48bb78;font-weight:700;">✓ Made Up</span>
        </div>`;
      });
      html += '</div></details>';
    }
    html += '</div>';
  });
  container.innerHTML = html || '<div class="empty-state">🎉 No make-ups needed!</div>';
};

window.markMakeupDone = async function(key) {
  await set(ref(db, `makeups/${key}`), true);
};

window.exportMakeupCSV = function() {
  let csv = 'Grade,Student,Missed Date,Reason,Status\n';
  Object.values(records).filter(r => r.status!=='present').forEach(r => {
    const grade   = grades[r.gradeId];
    const student = grade?.students?.[r.studentId];
    if (!grade || !student) return;
    const makeupKey  = `${r.gradeId}_${r.studentId}_${r.date}`;
    const hasMakeup  = Object.values(records).some(mr =>
      mr.studentId===r.studentId && mr.gradeId===r.gradeId &&
      mr.status==='present' && mr.date > r.date
    ) || !!makeups[makeupKey];
    csv += `"${grade.name}","${student.name}","${r.date}","${r.status}","${hasMakeup?'Made Up':'Pending'}"\n`;
  });
  downloadCSV(csv, 'slp_makeups.csv');
};

// ── View Switching ────────────────────────────────────────────────────────────
window.switchView = function(view) {
  document.getElementById('main-view').style.display    = view==='main'    ? 'block' : 'none';
  document.getElementById('history-view').style.display = view==='history' ? 'block' : 'none';
  document.getElementById('makeup-view').style.display  = view==='makeup'  ? 'block' : 'none';
  document.querySelectorAll('.view-tab').forEach((t,i) => {
    t.classList.toggle('active',
      (i===0&&view==='main')||(i===1&&view==='makeup')||(i===2&&view==='history'));
  });
  if (view==='history') renderHistory();
  if (view==='makeup')  renderMakeups();
};

// ── Misc ──────────────────────────────────────────────────────────────────────
function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
document.getElementById('session-date').addEventListener('change', renderStudentPanel);

</script>
